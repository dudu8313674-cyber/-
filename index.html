<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>创业项目模拟器</title><link rel="stylesheet" href="./styles.css"></head><body><main class="app"><aside class="sidebar"><div class="brand"><div class="mark">P</div><div><h1>创业项目模拟器</h1><p>20 个行业样本 · 参数化推演</p></div></div><label class="field"><span>行业</span><select id="industrySelect"></select></label><div class="project-list" id="projectList"></div></aside><section class="workspace"><header class="topbar"><div><p class="eyebrow" id="projectIndustry"></p><h2 id="projectName"></h2><p id="projectSummary"></p></div><div class="score-box"><span>模拟成功率</span><strong id="successRate">0%</strong></div></header><section class="overview-grid"><article><span>启动资金</span><strong id="capitalNeed"></strong></article><article><span>回本周期</span><strong id="paybackTime"></strong></article><article><span>毛利空间</span><strong id="grossMargin"></strong></article><article><span>风险等级</span><strong id="riskLevel"></strong></article></section><section class="main-grid"><section class="panel controls-panel"><div class="panel-head"><h3>经营参数</h3><button id="resetBtn" type="button">恢复基准</button></div><div id="controls"></div></section><section class="panel result-panel"><div class="panel-head"><h3>模拟结果</h3><span id="confidenceLabel"></span></div><div class="meter"><div id="meterFill"></div></div><div class="result-stack" id="resultStack"></div></section></section><section class="panel target-panel"><div class="panel-head"><h3>80% 成功率反推</h3><span id="targetStatus"></span></div><div id="targetPlan"></div></section><section class="details-grid"><section class="panel"><h3>运行方案</h3><ol id="planList"></ol></section><section class="panel"><h3>商业模型</h3><div id="businessModel"></div></section><section class="panel"><h3>商业案例参照</h3><div id="caseStudy"></div></section><section class="panel"><h3>参数影响说明</h3><div id="impactNotes"></div></section></section></section></main><script src="./app.js"></script></body></html>
